<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 18 18">
  <!-- Stylized "A" as a voice symbol with subtle sound wave -->
  <g fill="none" stroke="black" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
    <!-- The "A" letterform — tall and narrow, voice-like -->
    <path d="M5.5 14 L9 3 L12.5 14"/>
    <!-- Crossbar -->
    <line x1="6.8" y1="10.5" x2="11.2" y2="10.5"/>
    <!-- Sound wave arcs (right side) -->
    <path d="M13.8 6.5 Q15.2 9 13.8 11.5" stroke-width="1.2"/>
    <path d="M15.2 5 Q17.2 9 15.2 13" stroke-width="1.0" opacity="0.6"/>
  </g>
</svg>
