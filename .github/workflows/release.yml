name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Show build environment
        run: |
          sw_vers
          xcodebuild -version
          xcrun --sdk macosx --show-sdk-version
          swift --version

      - name: Build whisper.cpp
        run: bash scripts/build-whisper.sh Release

      - name: Build app bundle
        run: bash scripts/bundle-app.sh

      - name: Create DMG
        run: |
          APP_PATH="build/Aavaz.app"
          DMG_PATH="build/Aavaz.dmg"
          # Create a temporary directory for DMG contents
          mkdir -p build/dmg
          cp -R "$APP_PATH" build/dmg/
          ln -s /Applications build/dmg/Applications
          hdiutil create -volname "Aavaz" -srcfolder build/dmg -ov -format UDZO "$DMG_PATH"
          rm -rf build/dmg
          echo "DMG created at $DMG_PATH"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Aavaz-macOS-arm64
          path: |
            build/Aavaz.app
            build/Aavaz.dmg

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/Aavaz.dmg
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
